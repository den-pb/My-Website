<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WeblibSys – ISUCC Library</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1a5c2e;--green2:#2e7d32;--green3:#43a047;
  --gold:#f5a623;--gold2:#ffb74d;
  --dark:#1a2332;--mid:#3d4f63;--gray:#7a8fa6;
  --light:#f4f6f9;--white:#fff;
  --shadow:0 2px 16px rgba(0,0,0,.10);
  --radius:10px;
  --success:#27ae60;--danger:#e53935;--info:#0288d1;--warn:#f57c00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--light);color:var(--dark);font-size:15px;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,#0d3b1e 0%,#1a5c2e 45%,#2e7d32 70%,#33691e 100%);}
.lc{background:rgba(255,255,255,.97);border-radius:18px;
  padding:40px 44px;width:420px;max-width:95vw;
  box-shadow:0 24px 60px rgba(0,0,0,.35);}
.lc-logo{text-align:center;margin-bottom:24px;}
.lc-logo .badge{width:72px;height:72px;background:var(--green);
  border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;
  justify-content:center;font-size:2rem;}
.lc-logo h1{font-family:'Merriweather',serif;font-size:1.8rem;
  color:var(--green);letter-spacing:.5px;}
.lc-logo p{font-size:.82rem;color:var(--gray);margin-top:3px;}
.lc label{display:block;font-size:.78rem;font-weight:700;
  color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.lc select,.lc input{width:100%;padding:11px 14px;border:1.8px solid #dde3ec;
  border-radius:8px;font-size:.95rem;font-family:inherit;outline:none;
  transition:border-color .2s;background:#fafcff;margin-bottom:14px;}
.lc select:focus,.lc input:focus{border-color:var(--green);}
.lc-btn{width:100%;padding:13px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:1rem;font-weight:700;
  font-family:inherit;cursor:pointer;margin-top:4px;
  transition:background .2s,transform .1s;}
.lc-btn:hover{background:var(--green2);}
.lc-btn:active{transform:scale(.98);}
.lc-hint{margin-top:16px;background:#f0f7f1;border-radius:8px;
  padding:11px 14px;font-size:.79rem;color:var(--mid);line-height:1.7;}
.lc-hint b{color:var(--green);}

/* ── APP SHELL ── */
#app{display:none;flex-direction:row;min-height:100vh;}
.sidebar{width:240px;background:var(--dark);color:#fff;
  display:flex;flex-direction:column;flex-shrink:0;
  position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-brand h2{font-family:'Merriweather',serif;font-size:1.25rem;
  color:var(--gold);letter-spacing:.5px;}
.sb-brand p{font-size:.72rem;opacity:.55;margin-top:2px;}
.sb-user{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px;}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:var(--green3);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1rem;flex-shrink:0;}
.sb-user-info{min-width:0;}
.sb-user-info p{font-size:.82rem;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.sb-user-info span{font-size:.72rem;opacity:.55;text-transform:capitalize;}
.sb-nav{flex:1;padding:8px 0;}
.nav-item{display:flex;align-items:center;gap:11px;
  padding:10px 18px;cursor:pointer;font-size:.88rem;
  transition:background .15s;border-left:3px solid transparent;
  white-space:nowrap;}
.nav-item:hover{background:rgba(255,255,255,.07);}
.nav-item.active{background:rgba(255,255,255,.12);
  border-left-color:var(--gold);font-weight:600;}
.nav-item .ni{font-size:1.05rem;width:20px;text-align:center;}
.sb-out{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);
  cursor:pointer;font-size:.82rem;opacity:.65;display:flex;align-items:center;gap:8px;}
.sb-out:hover{opacity:1;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--white);padding:13px 26px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #e4eaf2;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.topbar h3{font-size:1.1rem;font-weight:700;color:var(--dark);}
.topbar-right{font-size:.83rem;color:var(--gray);}
.page{flex:1;padding:24px 28px;overflow-y:auto;}

/* ── CARDS & STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px;}
.stat{background:var(--white);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;border-top:3px solid transparent;}
.stat.s1{border-color:var(--green);}
.stat.s2{border-color:var(--gold);}
.stat.s3{border-color:var(--info);}
.stat.s4{border-color:var(--danger);}
.stat .ico{font-size:2rem;}
.stat-text p{font-size:.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;}
.stat-text h3{font-size:1.7rem;font-weight:700;line-height:1.2;}

.card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px 24px;margin-bottom:20px;}
.card-title{font-size:1rem;font-weight:700;color:var(--green);
  border-left:4px solid var(--gold);padding-left:10px;margin-bottom:16px;}

/* ── TABLE ── */
.tbar{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.search-wrap{display:flex;align-items:center;gap:8px;
  border:1.5px solid #dde3ec;border-radius:7px;
  padding:8px 13px;background:#fafcff;}
.search-wrap input{border:none;outline:none;font-size:.9rem;
  font-family:inherit;width:220px;background:transparent;}
.tcount{font-size:.8rem;color:var(--gray);}

.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.86rem;}
thead tr{background:var(--green);color:#fff;}
thead th{padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0f4f8;transition:background .1s;}
tbody tr:hover{background:#f6fbf7;}
tbody td{padding:9px 12px;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:.75rem;font-weight:700;white-space:nowrap;}
.b-avail{background:#e8f5e9;color:#2e7d32;}
.b-borrow{background:#fff8e1;color:#f57c00;}
.b-over{background:#ffebee;color:#c62828;}
.b-ret{background:#e3f2fd;color:#1565c0;}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border:none;border-radius:7px;cursor:pointer;
  font-size:.85rem;font-weight:600;font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-sm{padding:4px 10px;font-size:.78rem;}
.btn-green{background:var(--green);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-info{background:var(--info);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-gray{background:#7a8fa6;color:#fff;}
.btn-success{background:var(--success);color:#fff;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;
  background:rgba(15,25,40,.5);z-index:999;
  align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:12px;padding:28px 30px;
  width:92%;max-width:500px;box-shadow:0 12px 48px rgba(0,0,0,.25);
  max-height:90vh;overflow-y:auto;}
.modal h3{color:var(--green);font-size:1.15rem;margin-bottom:18px;
  font-family:'Merriweather',serif;}
.m-group{margin-bottom:13px;}
.m-group label{display:block;font-size:.78rem;font-weight:700;
  color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.m-group input,.m-group select,.m-group textarea{
  width:100%;padding:9px 12px;border:1.8px solid #dde3ec;
  border-radius:7px;font-size:.92rem;font-family:inherit;outline:none;}
.m-group input:focus,.m-group select:focus{border-color:var(--green);}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.preview-box{background:#f6fbf7;border:1px solid #c8e6c9;
  border-radius:7px;padding:9px 12px;font-size:.83rem;
  color:var(--green);margin-top:6px;min-height:28px;}

/* ── ALERTS ── */
#alertArea{margin-bottom:14px;}
.alert{padding:11px 16px;border-radius:8px;font-size:.88rem;margin-bottom:8px;}
.a-s{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
.a-d{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a;}
.a-i{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9;}

/* ── REPORT ── */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.rep-card{background:var(--green);color:#fff;border-radius:var(--radius);
  padding:16px;text-align:center;}
.rep-card h4{font-size:2rem;font-weight:800;}
.rep-card p{font-size:.75rem;opacity:.8;margin-top:2px;}

/* ── PAGE HEADER ── */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.ph h2{font-size:1.15rem;font-weight:700;}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap;}
.pag button{padding:5px 11px;border:1.5px solid #dde3ec;background:#fff;
  border-radius:6px;cursor:pointer;font-size:.82rem;font-family:inherit;}
.pag button.active{background:var(--green);color:#fff;border-color:var(--green);}
.pag button:hover:not(.active){background:#f0f7f1;}

@media(max-width:680px){
  .sidebar{width:56px;}
  .sb-brand p,.sb-user-info,.nav-item span,.sb-out span{display:none;}
  .sb-brand h2{font-size:.8rem;}
  .nav-item{justify-content:center;padding:12px;}
  .page{padding:14px;}
}
</style>
</head>

// DATABASE (localStorage)
// ═══════════════════════════════════════════
const DB={
  init(){
    if(!localStorage.getItem('wls_books')){
      const books=BOOKS_DATA.map(b=>({...b,available:b.copies}));
      localStorage.setItem('wls_books',JSON.stringify(books));
    }
    if(!localStorage.getItem('wls_students'))
      localStorage.setItem('wls_students',JSON.stringify(STUDENTS_DATA));
    if(!localStorage.getItem('wls_borrows'))
      localStorage.setItem('wls_borrows',JSON.stringify([]));
  },
  books(){return JSON.parse(localStorage.getItem('wls_books'))||[];},
  students(){return JSON.parse(localStorage.getItem('wls_students'))||[];},
  borrows(){return JSON.parse(localStorage.getItem('wls_borrows'))||[];},
  saveBooks(b){localStorage.setItem('wls_books',JSON.stringify(b));},
  saveStudents(s){localStorage.setItem('wls_students',JSON.stringify(s));},
  saveBorrows(b){localStorage.setItem('wls_borrows',JSON.stringify(b));},
  book(isbn){return this.books().find(b=>b.isbn===isbn);},
  student(id){return this.students().find(s=>s.id===id)||TEACHERS_DATA.find(t=>t.id===id);},
  borrow(studentId,isbn){
    const books=this.books();
    const bk=books.find(b=>b.isbn===isbn);
    if(!bk||bk.available<1)return{ok:false,msg:'Book not available or not found.'};
    const stu=this.student(studentId);
    if(!stu)return{ok:false,msg:'Student/Teacher ID not found.'};
    const borrows=this.borrows();
    if(borrows.find(b=>b.studentId===studentId&&b.isbn===isbn&&b.status==='borrowed'))
      return{ok:false,msg:'Already borrowed this book.'};
    bk.available-=1;
    this.saveBooks(books);
    const due=new Date();due.setDate(due.getDate()+7);
    borrows.push({
      id:'BRW-'+Date.now(),
      studentId,studentName:stu.name,
      isbn,bookTitle:bk.title,
      borrowDate:new Date().toISOString(),
      dueDate:due.toISOString(),
      status:'borrowed'
    });
    this.saveBorrows(borrows);
    return{ok:true,msg:`Borrowed! Due: ${due.toDateString()}`};
  },
  return_(studentId,isbn){
    const borrows=this.borrows();
    const idx=borrows.findIndex(b=>b.studentId===studentId&&b.isbn===isbn&&b.status==='borrowed');
    if(idx===-1)return{ok:false,msg:'No active borrow record found.'};
    const late=new Date()>new Date(borrows[idx].dueDate);
    borrows[idx].status=late?'returned-late':'returned';
    borrows[idx].returnDate=new Date().toISOString();
    this.saveBorrows(borrows);
    const books=this.books();
    const bk=books.find(b=>b.isbn===isbn);
    if(bk){bk.available+=1;this.saveBooks(books);}
    return{ok:true,msg:late?'Returned (overdue).':'Returned on time!'};
  },
  addBook(b){
    const books=this.books();
    if(books.find(x=>x.isbn===b.isbn))return{ok:false,msg:'ISBN already exists.'};
    books.push({...b,available:b.copies});
    this.saveBooks(books);return{ok:true};
  },
  deleteBook(isbn){
    const books=this.books().filter(b=>b.isbn!==isbn);
    this.saveBooks(books);
  },
  addStudent(s){
    const st=this.students();
    if(st.find(x=>x.id===s.id))return{ok:false,msg:'ID already exists.'};
    st.push(s);this.saveStudents(st);return{ok:true};
  },
  stats(){
    const books=this.books();
    const borrows=this.borrows();
    const active=borrows.filter(b=>b.status==='borrowed');
    const overdue=active.filter(b=>new Date()>new Date(b.dueDate));
    return{
      totalTitles:books.length,
      totalCopies:books.reduce((s,b)=>s+b.copies,0),
      available:books.reduce((s,b)=>s+b.available,0),
      activeBorrows:active.length,
      overdue:overdue.length,
      totalStudents:this.students().length
    };
  }
};

function fmtDate(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});
}
function isOverdue(iso){return new Date()>new Date(iso);}
function alert_(msg,type='i'){
  const el=document.getElementById('alertArea');
  if(!el)return;
  el.innerHTML=`<div class="alert a-${type}">${msg}</div>`;
  setTimeout(()=>{if(el)el.innerHTML='';},4000);
}

let modalAction=null;
function openModal(title,body,action,actionLabel='Confirm'){

  document.getElementById('mBody').innerHTML=body;
  modalAction=action;
  document.getElementById('mActions').innerHTML=
    `<button class="btn btn-gray" onclick="closeModal()">Cancel</button>
     ${action?`<button class="btn btn-green" onclick="modalAction&&modalAction()">${actionLabel}</button>`:''}`;
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){document.getElementById('overlay').classList.remove('on');modalAction=null;}

// Pagination
let pgState={items:[],page:1,perPage:25,renderRow:null,tableId:'',countId:''};
function renderPage(){
  const start=(pgState.page-1)*pgState.perPage;
  const slice=pgState.items.slice(start,start+pgState.perPage);
  const tbody=document.querySelector(`#${pgState.tableId} tbody`);
  if(!tbody)return;
  tbody.innerHTML=slice.map(pgState.renderRow).join('');
  const ct=document.getElementById(pgState.countId);
  if(ct)ct.textContent=`${pgState.items.length} records`;
  renderPagination();
}
function renderPagination(){
  const total=Math.ceil(pgState.items.length/pgState.perPage);
  const el=document.getElementById('pagination');
  if(!el||total<=1){if(el)el.innerHTML='';return;}
  let h='';
  const range=3;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-pgState.page)<=range)
      h+=`<button class="${pgState.page===i?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-pgState.page)===range+1)h+=`<span>…</span>`;
  }
  el.innerHTML=h;
}
function goPage(n){pgState.page=n;renderPage();}
function filterItems(q){
  const kw=q.toLowerCase();
  const src=pgState.allItems||pgState.items;
  pgState.items=q?src.filter(i=>Object.values(i).join(' ').toLowerCase().includes(kw)):src.slice();
  pgState.page=1;renderPage();
}

  const hist=all.filter(b=>b.status.startsWith('returned')).reverse();
  document.getElementById('pageBody').innerHTML=`
    <div id="alertArea"></div>
    <div class="ph"><h2>📖 My Borrowed Books</h2></div>
    <div class="card">
      <div class="card-title">Currently Borrowed (${active.length})</div>
      <div class="tbl-wrap"><table><thead><tr><th>Book</th><th>Borrowed</th><th>Due Date</th><th>Status</th></tr></thead>
      <tbody>${!active.length?'<tr><td colspan="4" style="text-align:center;color:var(--gray)">No active borrows.</td></tr>':
        active.map(b=>{const od=isOverdue(b.dueDate);return`<tr>
          <td><b>${b.bookTitle}</b></td><td>${fmtDate(b.borrowDate)}</td>
          <td>${fmtDate(b.dueDate)}</td>
          <td><span class="badge ${od?'b-over':'b-borrow'}">${od?'⚠️ Overdue':'Active'}</span></td></tr>`;}).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <div class="card-title">Return History</div>
      <div class="tbl-wrap"><table><thead><tr><th>Book</th><th>Returned</th><th>Status</th></tr></thead>
      <tbody>${!hist.length?'<tr><td colspan="3" style="text-align:center;color:var(--gray)">No history.</td></tr>':
        hist.map(b=>`<tr><td>${b.bookTitle}</td><td>${fmtDate(b.returnDate)}</td>
          <td><span class="badge ${b.status==='returned-late'?'b-over':'b-ret'}">${b.status}</span></td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

// ─── STUDENTS ───
function students(){
  const st=DB.students();
  document.getElementById('pageBody').innerHTML=`
    <div id="alertArea"></div>
    <div class="ph"><h2>🎓 Students</h2>
      <button class="btn btn-green" onclick="addStudentModal()">+ Add Student</button></div>
    <div class="card">
      <div class="tbar">
        <div class="search-wrap">🔍<input type="text" placeholder="Search students..." oninput="filterItems(this.value)"/></div>
        <span class="tcount" id="stCount"></span>
      </div>
      <div class="tbl-wrap">
        <table id="stTable"><thead><tr><th>Student ID</th><th>Name</th><th>Course</th><th>Year</th><th>Borrows</th><th>Action</th></tr></thead>
        <tbody></tbody></table>
      </div>
      <div class="pag" id="pagination"></div>
    </div>`;
  pgState={
    items:st,allItems:st.slice(),page:1,perPage:25,
    countId:'stCount',tableId:'stTable',
    renderRow:s=>{
      const cnt=DB.borrows().filter(b=>b.studentId===s.id&&b.status==='borrowed').length;
      return`<tr><td>${s.id}</td><td><b>${s.name}</b></td><td>${s.course}</td>
        <td>Year ${s.yr}</td><td>${cnt}</td>
        <td><button class="btn btn-info btn-sm" onclick="viewStudentBorrows('${s.id}')">History</button></td></tr>`;
    }
  };
  renderPage();
}
function viewStudentBorrows(id){
  const s=DB.student(id);
  const all=DB.borrows().filter(b=>b.studentId===id);
  openModal(`${s?s.name:id} – Borrow History`,
    `<div class="tbl-wrap"><table><thead><tr><th>Book</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${!all.length?'<tr><td colspan="3" style="color:var(--gray);text-align:center">No records.</td></tr>':
      all.map(b=>`<tr><td>${b.bookTitle}</td><td>${fmtDate(b.borrowDate)}</td>
        <td><span class="badge ${b.status.startsWith('returned')?'b-ret':'b-borrow'}">${b.status}</span></td></tr>`).join('')
    }</tbody></table></div>`,null);
}
function addStudentModal(){
  openModal('Add New Student',`
    <div class="m-group"><label>Student ID</label><input type="text" id="ns_id" placeholder="2024-00001"/></div>
    <div class="m-group"><label>Full Name</label><input type="text" id="ns_name" placeholder="Last, First"/></div>
    <div class="m-row">
      <div class="m-group"><label>Course</label><select id="ns_course">
        <option>BSIT</option><option>BSCS</option><option>BSIS</option><option>BSECE</option>
      </select></div>
      <div class="m-group"><label>Year</label><select id="ns_yr">
        <option>1</option><option>2</option><option>3</option><option>4</option>
      </select></div>
    </div>`,()=>{
    const s={id:document.getElementById('ns_id').value.trim(),
      name:document.getElementById('ns_name').value.trim(),
      course:document.getElementById('ns_course').value,
      yr:parseInt(document.getElementById('ns_yr').value)};
    if(!s.id||!s.name){alert('Fill all fields.');return;}
    const res=DB.addStudent(s);
    closeModal();alert_(res.ok?'Student added!':res.msg,res.ok?'s':'d');
    if(res.ok)students();
  },'Save Student');
}

// ─── BOOKS MGMT ───
function books_mgmt(){
  const books=DB.books();
  document.getElementById('pageBody').innerHTML=`
    <div id="alertArea"></div>
    <div class="ph"><h2>🗂️ Manage Books</h2>
      <button class="btn btn-green" onclick="addBookModal()">+ Add Book</button></div>
    <div class="card">
      <div class="tbar">
        <div class="search-wrap">🔍<input type="text" placeholder="Search books..." oninput="filterItems(this.value)"/></div>
        <span class="tcount" id="bmCount"></span>
      </div>
      <div class="tbl-wrap">
        <table id="bmTable"><thead><tr><th>ISBN</th><th>Title</th><th>Author</th><th>Category</th><th>Copies</th><th>Available</th><th></th></tr></thead>
        <tbody></tbody></table>
      </div>
      <div class="pag" id="pagination"></div>
    </div>`;
  pgState={
    items:books,allItems:books.slice(),page:1,perPage:25,
    countId:'bmCount',tableId:'bmTable',
    renderRow:b=>`<tr>
      <td style="font-size:.8rem;color:var(--gray)">${b.isbn}</td>
      <td><b>${b.title}</b></td><td>${b.author}</td><td>${b.category}</td>
      <td>${b.copies}</td>
      <td><span class="badge ${b.available>0?'b-avail':'b-borrow'}">${b.available}/${b.copies}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteBook('${b.isbn}')">🗑</button></td></tr>`
  };
  renderPage();
}
function addBookModal(){
  openModal('Add New Book',`
    <div class="m-group"><label>ISBN</label><input type="text" id="nb_isbn" placeholder="978-971-XXXX"/></div>
    <div class="m-group"><label>Title</label><input type="text" id="nb_title" placeholder="Book title"/></div>
    <div class="m-group"><label>Author</label><input type="text" id="nb_author" placeholder="Surname, First"/></div>
    <div class="m-row">
      <div class="m-group"><label>Category</label><select id="nb_cat">
        <option>IT</option><option>CS</option><option>Database</option><option>Networking</option>
        <option>IS</option><option>Math</option><option>Science</option><option>GE</option>
        <option>Research</option><option>LibIS</option><option>Management</option>
        <option>Electronics</option><option>Engineering</option>
      </select></div>
      <div class="m-group"><label>Copies</label><input type="number" id="nb_copies" value="1" min="1"/></div>
    </div>`,()=>{
    const copies=parseInt(document.getElementById('nb_copies').value)||1;
    const b={isbn:document.getElementById('nb_isbn').value.trim(),
      title:document.getElementById('nb_title').value.trim(),
      author:document.getElementById('nb_author').value.trim(),
      category:document.getElementById('nb_cat').value,copies};
    if(!b.isbn||!b.title||!b.author){alert('Fill all fields.');return;}
    const res=DB.addBook(b);
    closeModal();alert_(res.ok?'Book added!':res.msg,res.ok?'s':'d');
    if(res.ok)books_mgmt();
  },'Add Book');
}
function deleteBook(isbn){
  if(!confirm('Delete this book? Cannot be undone.'))return;
  DB.deleteBook(isbn);alert_('Book deleted.','i');books_mgmt();
}

// ─── REPORTS ───
function reports(){
  const s=DB.stats();
  const books=DB.books();
  const allBorrows=DB.borrows();
  // by category
  const byCat={};
  books.forEach(b=>{byCat[b.category]=(byCat[b.category]||0)+1;});
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`<tr><td>${c}</td><td>${n}</td></tr>`).join('');
  // most borrowed
  const bCounts={};
  allBorrows.forEach(b=>{bCounts[b.isbn]=(bCounts[b.isbn]||0)+1;});
  const topBooks=books.sort((a,b)=>(bCounts[b.isbn]||0)-(bCounts[a.isbn]||0)).slice(0,8);
  document.getElementById('pageBody').innerHTML=`
    <div id="alertArea"></div>
    <div class="ph"><h2>📊 Reports & Statistics</h2>
      <button class="btn btn-gold" onclick="window.print()">🖨️ Print</button></div>
    <div class="rep-grid">
      <div class="rep-card"><h4>${s.totalTitles}</h4><p>Book Titles</p></div>
      <div class="rep-card"><h4>${s.totalCopies}</h4><p>Total Copies</p></div>
      <div class="rep-card"><h4>${s.available}</h4><p>Available</p></div>
      <div class="rep-card"><h4>${s.activeBorrows}</h4><p>Active Borrows</p></div>
      <div class="rep-card"><h4>${s.overdue}</h4><p>Overdue</p></div>
      <div class="rep-card"><h4>${s.totalStudents}</h4><p>Students</p></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px">
      <div class="card"><div class="card-title">Books by Category</div>
        <div class="tbl-wrap"><table><thead><tr><th>Category</th><th>Titles</th></tr></thead>
        <tbody>${catRows}</tbody></table></div></div>
      <div class="card"><div class="card-title">Most Borrowed Books (Top 8)</div>
        <div class="tbl-wrap"><table><thead><tr><th>Title</th><th>Borrows</th></tr></thead>
        <tbody>${topBooks.map(b=>`<tr><td>${b.title}</td><td>${bCounts[b.isbn]||0}</td></tr>`).join('')}
        </tbody></table></div></div>
    </div>
    <div class="card">
      <div class="card-title">All Transactions (${allBorrows.length})</div>
      <div class="tbl-wrap"><table><thead><tr><th>Student</th><th>Book</th><th>Borrowed</th><th>Due</th><th>Returned</th><th>Status</th></tr></thead>
      <tbody>${!allBorrows.length?'<tr><td colspan="6" style="text-align:center;color:var(--gray)">No transactions.</td></tr>':
        [...allBorrows].reverse().map(b=>{
          const od=b.status==='borrowed'&&isOverdue(b.dueDate);
          const cls=b.status.startsWith('returned')?'b-ret':od?'b-over':'b-borrow';
          return`<tr><td>${b.studentName}</td><td>${b.bookTitle}</td>
            <td>${fmtDate(b.borrowDate)}</td><td>${fmtDate(b.dueDate)}</td>
            <td>${fmtDate(b.returnDate)}</td>
            <td><span class="badge ${cls}">${od?'Overdue':b.status}</span></td></tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;
}
</script>
</body>
</html>
