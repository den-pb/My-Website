<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<!-- Challenge: Custom fonts and colors -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  /* Challenge: Replace background with GIF animation */
  background-image: url('underconstruction.gif'), url('underconstruction.jpg');
  background-size: cover;
  background-position: center;
  text-align: center;
  color: white;
  font-family: 'Inter', Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Dark overlay for readability */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(7, 9, 15, 0.82);
  z-index: 0;
}

.coming-soon {
  position: relative;
  z-index: 1;
  max-width: 700px;
  padding: 2rem;
}

/* Challenge: Domain name as heading */
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 3.2rem;
  font-weight: 900;
  color: #c9a84c;
  margin-bottom: 0.5rem;
  letter-spacing: 1px;
}

.domain-name {
  display: block;
  font-size: 1rem;
  font-weight: 400;
  color: #c8c2b4;
  font-family: 'Inter', system-ui, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 0.25rem;
}

/* Challenge: Moving text */
.marquee {
  overflow: hidden;
  white-space: nowrap;
  font-size: 0.9rem;
  color: #c9a84c;
  margin-bottom: 2rem;
  font-style: italic;
}

.marquee span {
  display: inline-block;
  animation: scroll-text 12s linear infinite;
}

@keyframes scroll-text {
  0%   { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

#countdown {
  font-size: 40px;
  margin-top: 20px;
  font-weight: 700;
  font-family: 'Playfair Display', Georgia, serif;
  color: #f0ece3;
  letter-spacing: 4px;
}

.contact-info {
  margin-top: 30px;
  font-size: 18px;
  background: linear-gradient(135deg, rgba(17,24,39,0.85) 0%, rgba(138,43,78,0.08) 100%);
  backdrop-filter: blur(12px);
  border: 1px solid var(--wine-line);
  border-radius: var(--r);
  padding: 1.5rem 2rem;
  display: inline-block;
  text-align: left;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.contact-info:hover {
  border-color: var(--gold-line);
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
}

.contact-info a {
  color: var(--gold);
  font-weight: 600;
  transition: color 0.2s;
}
.contact-info a:hover {
  color: #e2c06a;
  text-decoration: underline;
}

.footer-info {
  margin-top: 50px;
  font-size: 14px;
  color: #7a7468;
}
</style>
</head>
<body>

<div class="coming-soon">

  <h1>

  <div class="marquee"><span>&#9733; We are building something amazing — stay tuned! &#9733;</span></div>

  <p class="contact-info">
    Reach out directly:<br>
    Mobile: <a href="tel:09691579326">09691579326</a> <br>
    Email: <a href="mailto:denmarkdeleon0901@gmail.com">denmarkdeleon0901@gmail.com</a> <br>

      '  <a href="profile.html" class="btn" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.3rem;background:transparent;color:#f0ece3;border:1px solid #1e2535;border-radius:7px;font-weight:600;text-decoration:none;">Profile</a>' +

      '  <a href="favorites.html" class="btn" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.3rem;background:transparent;color:#f0ece3;border:1px solid #1e2535;border-radius:7px;font-weight:600;text-decoration:none;">Favorites</a>' +
      '  <a href="contact.html" class="btn" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.3rem;background:transparent;color:#f0ece3;border:1px solid #1e2535;border-radius:7px;font-weight:600;text-decoration:none;">Contact</a>' +

      '  Mobile: <a href="tel:09691579326">09691579326</a><br>' +
      '  Email: <a href="mailto:denmarkdeleon0901@gmail.com">denmarkdeleon0901@gmail.com</a><br>' +
      '  Messenger: <a href="https://m.me/den.0001.1" target="_blank">Message Me</a>' +
      '</p>';
    return;
  }
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById("countdown").innerHTML = days + "d " + hours + "h "
    + minutes + "m " + seconds + "s ";

</html>
