<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<!-- Challenge: Custom fonts and colors -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  /* Challenge: Replace background with GIF animation */
  background-image: url('underconstruction.gif'), url('underconstruction.jpg');
  background-size: cover;
  background-position: center;
  text-align: center;
  color: white;
  font-family: 'Inter', Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Dark overlay for readability */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(7, 9, 15, 0.65);
  z-index: 0;
}

.coming-soon {
  position: relative;
  z-index: 1;
  max-width: 700px;
  padding: 2rem;
}

/* Challenge: Domain name as heading */
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 3.2rem;
  font-weight: 900;
  color: #c9a84c;
  margin-bottom: 0.5rem;
  letter-spacing: 1px;
}

.domain-name {
  display: block;
  font-size: 1rem;
  font-weight: 400;
  color: #c8c2b4;
  font-family: 'Inter', system-ui, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 0.25rem;
}

/* Challenge: Moving text */
.marquee {
  overflow: hidden;
  white-space: nowrap;
  font-size: 0.9rem;
  color: #c9a84c;
  margin-bottom: 2rem;
  font-style: italic;
}

.marquee span {
  display: inline-block;
  animation: scroll-text 12s linear infinite;
}

@keyframes scroll-text {
  0%   { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

#countdown {
  font-size: 40px;
  margin-top: 20px;
  font-weight: 700;
  font-family: 'Playfair Display', Georgia, serif;
  color: #f0ece3;
  letter-spacing: 4px;
}

.contact-info {
  margin-top: 30px;
  font-size: 18px;
  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid #1e2535;
  border-radius: 12px;
  padding: 1.5rem 2rem;
  display: inline-block;
}

.contact-info a {
  color: yellow;
  font-weight: 600;
}

.footer-info {
  margin-top: 50px;
  font-size: 14px;
  color: #7a7468;
}
</style>
</head>
<body>

<div class="coming-soon">

  <!-- Challenge: Include your domain name as text heading -->
  <h1>
    Coming Soon
    <span class="domain-name">denmarkdev.online</span>
  </h1>

  <p>Our website is under construction. Please check back later!</p>

  <!-- Challenge: Moving text for dynamic content -->
  <div class="marquee"><span>&#9733; We are building something amazing — stay tuned! &#9733;</span></div>

  <p id="countdown"></p>

  <p class="contact-info">
    Reach out directly:<br>
    Mobile: <a href="tel:09691579326">09691579326</a> <br>
    Email: <a href="mailto:denmarkdeleon0901@gmail.com">denmarkdeleon0901@gmail.com</a> <br>
    Messenger: <a href="https://m.me/den.0001.1" target="_blank" style="color:yellow;">Message Me</a>
  </p>

  <p class="footer-info">All Rights Reserved. &copy; 2026 | denmarkdev.online</p>

</div>

<script>
// Set countdown to June 26, 2026, 11:59 AM
var countDownDate = new Date("June 26, 2026 11:59:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById("countdown").innerHTML = days + "d " + hours + "h "
    + minutes + "m " + seconds + "s ";
  if (distance < 0) {
    clearInterval(x);
    window.location.href = "homepage.html";
  }
}, 1000);
</script>

</body>
</html>
